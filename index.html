<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOXG1 Patient-Specific MRI Browser</title>
    <!-- Stlite styling -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.css"
    />
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Load Stlite Browser Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.js"></script>
    <script>
      async function loadAndMount() {
        // Fetch files from the local directory where index.html is hosted
        const [appResponse, csvResponse, jsonResponse] = await Promise.all([
          fetch('./app.py'),
          fetch('./processed_mri_data.csv'),
          fetch('./structure_graph.json')
        ]);

        const [appCode, csvData, jsonData] = await Promise.all([
          appResponse.text(),
          csvResponse.text(),
          jsonResponse.text()
        ]);

        // Mount the Streamlit app client-side in the browser
        stlite.mount({
          entrypoint: "app.py",
          files: {
            "app.py": appCode,
            "processed_mri_data.csv": csvData,
            "structure_graph.json": jsonData
          },
          requirements: ["pandas", "numpy", "altair", "scipy"]
        }, document.getElementById("root"));
      }

      loadAndMount();
    </script>
  </body>
</html>
